<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #111; color: #f5f5f5; }
        .container { max-width: 960px; margin: 0 auto; padding: 24px 24px 24px; }
        .back { display: inline-block; margin-bottom: 16px; color: #7dd3fc; text-decoration: none; }
        video { width: 100%; border-radius: 8px; background: #000; }
        .meta { margin-top: 16px; }
        .subtitle { color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/">← Back to movies</a>
        <h1>{{ movie.title }}</h1>
        <p class="subtitle">{{ movie.subtitle }}</p>
        <video controls preload="metadata" playsinline poster="{{ movie.thumb }}">
            {% if movie.sources.is_empty() %}
            <source src="https://download.blender.org/peach/bigbuckbunny_movies/BigBuckBunny_320x180.mp4" />
            {% else %}
            {% for source in movie.sources %}
            <source src="{{ source }}" />
            {% endfor %}
            {% endif %}
            Your browser does not support the video tag.
        </video>
        <div class="meta">
            <p>{{ movie.description }}</p>
        </div>
    </div>
</body>
</html>
