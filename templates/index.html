<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #f5f5f5; }
        .nav { padding: 0 32px; display: flex; align-items: center; height: 52px; border-bottom: 1px solid #27272a; }
        .nav-brand { font-weight: 700; color: #f4f4f5; font-size: 1rem; text-decoration: none; display: flex; align-items: center; gap: 8px; padding: 0 20px 0 0; margin-right: 4px; }
        .nav-link { color: #52525b; text-decoration: none; padding: 0 16px; height: 52px; display: flex; align-items: center; font-size: 0.875rem; transition: color 0.15s; }
        .nav-link:hover { color: #f4f4f5; }
        .nav-link.active { color: #f4f4f5; font-weight: 600; }
        .nav-right { margin-left: auto; }
        .nav-btn { border: 1px solid #3f3f46; color: #f4f4f5; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: border-color 0.15s; }
        .nav-btn:hover { border-color: #f4f4f5; }
        .container { max-width: 100%; margin: 0; padding: 24px 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 0; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 10px; overflow: hidden; transition: border-color 0.15s, background 0.15s; }
        .card:hover { border-color: #3f3f46; background: #1c1c1f; }
        .card-thumb { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; background: #18181b; border-bottom: 1px solid #27272a; }
        .card-thumb img { width: 100%; height: 100%; display: block; object-fit: cover; }
        .card-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #3f3f46; font-size: 2rem; font-weight: 700; font-family: sans-serif; }
        .card-content { padding: 10px 12px; }
        .card-title { color: #f4f4f5; text-decoration: none; font-weight: 600; font-size: 0.9rem; line-height: 1.35; display: block; }
        .card-title:hover { color: #a1a1aa; }
        .empty-state { color: #71717a; padding: 20px 0; }
        .banner { border: 1px solid #27272a; border-left: 3px solid #3f3f46; padding: 10px 16px; margin-bottom: 20px; font-size: 0.85rem; color: #71717a; display: flex; align-items: center; gap: 10px; }
        .banner-icon { color: #52525b; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3l8 5-8 5V3z"/></svg>Vidly</a>
        <a href="/" class="nav-link active">Home</a>
        <div class="nav-right"></div>
        <a href="/upload" class="nav-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 1v12M1 7h12"/></svg>Upload</a>
    </nav>

    <div class="container">
        <div class="banner">
            <span class="banner-icon">!</span>
            <span>Pre-release preview — all data is temporary and may be cleared without notice.</span>
        </div>
        {% if movies.is_empty() %}
            <p class="empty-state">No movies yet.</p>
        {% else %}
            <div class="grid">
                {% for movie in movies %}
                <div class="card">
                    <div class="card-thumb">
                        {% if movie.thumb.is_empty() %}
                        <div class="card-thumb-placeholder">?</div>
                        {% else %}
                        <img src="{{ movie.thumb }}" alt="{{ movie.title }}" onerror="this.outerHTML='<div class=card-thumb-placeholder>?</div>'" />
                        {% endif %}
                    </div>
                    <div class="card-content">
                        <a href="/movies/{{ movie.id }}" class="card-title">{{ movie.title }}</a>
                    </div>
                </div>
                {% endfor %}
            </div>
        {% endif %}
    </div>
</body>
</html>
