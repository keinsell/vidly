<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }} - Vidly</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #f5f5f5; }
        .nav { padding: 0 32px; display: flex; align-items: center; height: 52px; border-bottom: 1px solid #27272a; }
        .nav-brand { font-weight: 700; color: #f4f4f5; font-size: 1rem; text-decoration: none; display: flex; align-items: center; gap: 8px; padding: 0 20px 0 0; margin-right: 4px; }
        .nav-link { color: #52525b; text-decoration: none; padding: 0 16px; height: 52px; display: flex; align-items: center; font-size: 0.875rem; transition: color 0.15s; }
        .nav-link:hover { color: #f4f4f5; }
        .nav-right { margin-left: auto; }
        .nav-btn { border: 1px solid #3f3f46; color: #f4f4f5; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: border-color 0.15s; }
        .nav-btn:hover { border-color: #f4f4f5; }
        .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
        .title { font-size: 1.75rem; font-weight: 700; margin: 0 0 12px; line-height: 1.3; }
        .description { color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; margin: 0 0 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .tags { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .tag { background: #1f2937; color: #94a3b8; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; }
        .player-wrapper { background: #000; border-radius: 8px; overflow: hidden; }
        .player-wrapper video { display: block; width: 100%; height: auto; aspect-ratio: 16 / 9; object-fit: contain; background: #000; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3l8 5-8 5V3z"/></svg>Vidly</a>
        <a href="/" class="nav-link">Home</a>
        <div class="nav-right"></div>
        <a href="/upload" class="nav-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 1v12M1 7h12"/></svg>Upload</a>
    </nav>
    <div class="container">
        <h1 class="title">{{ movie.title }}</h1>
        <p class="description">{{ movie.description }}</p>
        <div class="tags">
            <span class="tag">Untagged</span>
        </div>
        <div class="player-wrapper">
            <video controls preload="metadata" playsinline poster="{{ movie.thumb }}">
                {% if movie.sources.is_empty() %}
                <source src="https://download.blender.org/peach/bigbuckbunny_movies/BigBuckBunny_320x180.mp4" />
                {% else %}
                {% for source in movie.sources %}
                <source src="{{ source }}" />
                {% endfor %}
                {% endif %}
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</body>
</html>
