<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }}</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #f5f5f5; }
        .nav { background: #1f2937; padding: 0 20px; display: flex; align-items: center; gap: 0; height: 48px; }
        .nav-brand { font-weight: 700; color: #fff; font-size: 1.05rem; letter-spacing: 0.02em; padding: 0 20px 0 0; border-right: 1px solid #374151; margin-right: 4px; text-decoration: none; }
        .nav-link { color: #94a3b8; text-decoration: none; padding: 0 14px; height: 48px; display: flex; align-items: center; font-size: 0.9rem; transition: color 0.15s; }
        .nav-link:hover { color: #7dd3fc; }
        .container { max-width: 960px; margin: 0 auto; padding: 24px 24px 24px; }
        .back { display: inline-block; margin-bottom: 16px; color: #7dd3fc; text-decoration: none; }
        video { width: 100%; border-radius: 8px; background: #000; }
        .meta { margin-top: 16px; }
        .subtitle { color: #cbd5e1; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">Vidly</a>
        <a href="/" class="nav-link">Home</a>
        <a href="/upload" class="nav-link">Upload</a>
    </nav>
    <div class="container">
        <a class="back" href="/">← Back to movies</a>
        <h1>{{ movie.title }}</h1>
        <p class="subtitle">{{ movie.subtitle }}</p>
        <video controls preload="metadata" playsinline poster="{{ movie.thumb }}">
            {% if movie.sources.is_empty() %}
            <source src="https://download.blender.org/peach/bigbuckbunny_movies/BigBuckBunny_320x180.mp4" />
            {% else %}
            {% for source in movie.sources %}
            <source src="{{ source }}" />
            {% endfor %}
            {% endif %}
            Your browser does not support the video tag.
        </video>
        <div class="meta">
            <p>{{ movie.description }}</p>
        </div>
    </div>
</body>
</html>
