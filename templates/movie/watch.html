<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }} - Vidly</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #f5f5f5; }
        .nav { padding: 0 32px; display: flex; align-items: center; height: 52px; border-bottom: 1px solid #27272a; }
        .nav-brand { font-weight: 700; color: #f4f4f5; font-size: 1rem; text-decoration: none; display: flex; align-items: center; gap: 8px; padding: 0 20px 0 0; margin-right: 4px; }
        .nav-link { color: #52525b; text-decoration: none; padding: 0 16px; height: 52px; display: flex; align-items: center; font-size: 0.875rem; transition: color 0.15s; }
        .nav-link:hover { color: #f4f4f5; }
        .nav-link.active { color: #f4f4f5; font-weight: 600; }
        .nav-right { margin-left: auto; }
        .nav-btn { border: 1px solid #3f3f46; color: #f4f4f5; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: border-color 0.15s; }
        .nav-btn:hover { border-color: #f4f4f5; }
        .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
        .title { font-size: 1.75rem; font-weight: 700; margin: 0 0 12px; line-height: 1.3; }
        .description { color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; margin: 0 0 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .tags { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .tag { background: #1f2937; color: #94a3b8; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }
        .tag-remove { background: none; border: none; color: #52525b; cursor: pointer; padding: 0; font-size: 0.9rem; line-height: 1; transition: color 0.15s; }
        .tag-remove:hover { color: #ef4444; }
        .tag-add { position: relative; display: inline-flex; }
        .tag-add-input { background: transparent; color: #71717a; border: 1px dashed #3f3f46; border-radius: 4px; padding: 4px 10px; font-size: 0.8rem; outline: none; width: 80px; transition: border-color 0.15s, color 0.15s, width 0.15s; font-family: inherit; }
        .tag-add-input::placeholder { color: #52525b; }
        .tag-add-input:focus { color: #f4f4f5; border-color: #7dd3fc; border-style: solid; width: 150px; }
        .tag-suggestions { display: none; position: absolute; top: 100%; left: 0; min-width: 180px; background: #18181b; border: 1px solid #3f3f46; border-radius: 6px; margin-top: 4px; max-height: 200px; overflow-y: auto; z-index: 10; padding: 4px; }
        .tag-suggestions.show { display: block; }
        .tag-suggestion { padding: 6px 10px; font-size: 0.8rem; color: #cbd5e1; cursor: pointer; border-radius: 4px; transition: background 0.1s; }
        .tag-suggestion:hover, .tag-suggestion.highlighted { background: #1f2937; color: #f4f4f5; }
        .tag-suggestion .tag-slug { color: #52525b; font-size: 0.75rem; margin-left: 8px; }
        .player-wrapper { background: #000; border-radius: 8px; overflow: hidden; }
        .player-wrapper video { display: block; width: 100%; height: auto; aspect-ratio: 16 / 9; object-fit: contain; background: #000; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3l8 5-8 5V3z"/></svg>Vidly</a>
        <a href="/" class="nav-link">Home</a>
        <a href="/categories" class="nav-link">Categories</a>
        <div class="nav-right"></div>
        <a href="/upload" class="nav-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 1v12M1 7h12"/></svg>Upload</a>
    </nav>
    <div class="container">
        <h1 class="title">{{ movie.title }}</h1>
        <p class="description">{{ movie.description }}</p>
        <div class="tags">
            {% for tag in tags %}
            <span class="tag">
                <a href="/categories/{{ tag.slug }}" style="color: #94a3b8; text-decoration: none;">{{ tag.name }}</a>
                <form method="post" action="/movies/{{ movie.id }}/tags/{{ tag.id }}/remove" style="display: inline;">
                    <button type="submit" class="tag-remove" title="Remove tag">&times;</button>
                </form>
            </span>
            {% endfor %}
            <form method="post" action="/movies/{{ movie.id }}/tags/add" id="tag-form" class="tag-add">
                <input type="text" id="tag-input" class="tag-add-input" placeholder="+ Add tag" autocomplete="off">
                <div id="tag-suggestions" class="tag-suggestions"></div>
                <input type="hidden" name="tag_id" id="tag-id-input">
            </form>
        </div>
        <script>
        var tagData = {{ all_tags_json|safe }};
        var input = document.getElementById('tag-input');
        var suggestions = document.getElementById('tag-suggestions');
        var tagIdInput = document.getElementById('tag-id-input');
        var form = document.getElementById('tag-form');
        var highlightIdx = -1;

        input.addEventListener('input', function() {
            var val = this.value.toLowerCase().trim();
            suggestions.innerHTML = '';
            highlightIdx = -1;
            if (!val) {
                suggestions.classList.remove('show');
                tagIdInput.value = '';
                return;
            }
            var matches = [];
            for (var i = 0; i < tagData.length; i++) {
                if (tagData[i].name.toLowerCase().includes(val)) {
                    matches.push(tagData[i]);
                }
            }
            if (matches.length === 0) {
                suggestions.classList.remove('show');
                return;
            }
            for (var i = 0; i < matches.length; i++) {
                var div = document.createElement('div');
                div.className = 'tag-suggestion';
                div.textContent = matches[i].name;
                var slugSpan = document.createElement('span');
                slugSpan.className = 'tag-slug';
                slugSpan.textContent = '/' + matches[i].slug;
                div.appendChild(slugSpan);
                div.addEventListener('click', (function(tag) {
                    return function() {
                        tagIdInput.value = tag.id;
                        form.submit();
                    };
                })(matches[i]));
                suggestions.appendChild(div);
            }
            suggestions.classList.add('show');
        });

        input.addEventListener('blur', function() {
            setTimeout(function() {
                suggestions.classList.remove('show');
            }, 200);
        });

        input.addEventListener('keydown', function(e) {
            var items = suggestions.querySelectorAll('.tag-suggestion');
            if (e.key === 'Enter') {
                e.preventDefault();
                if (highlightIdx >= 0 && items[highlightIdx]) {
                    items[highlightIdx].click();
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (items.length > 0) {
                    if (highlightIdx >= 0) items[highlightIdx].classList.remove('highlighted');
                    highlightIdx = (highlightIdx + 1) % items.length;
                    items[highlightIdx].classList.add('highlighted');
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (items.length > 0) {
                    if (highlightIdx >= 0) items[highlightIdx].classList.remove('highlighted');
                    highlightIdx = (highlightIdx - 1 + items.length) % items.length;
                    items[highlightIdx].classList.add('highlighted');
                }
            } else if (e.key === 'Escape') {
                suggestions.classList.remove('show');
                input.blur();
            }
        });
        </script>
        <div class="player-wrapper">
            <video controls preload="metadata" playsinline poster="{{ movie.thumb }}">
                {% if movie.sources.is_empty() %}
                <source src="https://download.blender.org/peach/bigbuckbunny_movies/BigBuckBunny_320x180.mp4" />
                {% else %}
                {% for source in movie.sources %}
                <source src="{{ source }}" />
                {% endfor %}
                {% endif %}
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</body>
</html>
