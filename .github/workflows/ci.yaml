name: CI

on:
  pull_request:
    branches:
      - main
      - next
      - trunk
      - release/*
      - feature/*
      - bugfix/*
      - hotfix/*
      - chore/*
  push:
    branches:
      - next
      - main
      - trunk
      - release/*
      - feature/*
      - bugfix/*
      - hotfix/*
      - chore/*
  release:
    types:
      - released
      - prereleased

jobs:
  lint:
    name: "lint"
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          target: x86_64-unknown-linux-gnu
          override: true
          components: rustfmt, clippy
      - name: Run rustfmt
        run: cargo fmt --all -- --check
        continue-on-error: true
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          target: ${{ matrix.target }}
          override: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Cargo test
        run: cargo nextest run --workspace --all-targets --all-features --no-tests=pass

      - name: Build application
        run: cargo build --release --target ${{ matrix.target }}

      - name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidly-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/vidly
            target/${{ matrix.target }}/release/vidly.exe
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vidly-x86_64-unknown-linux-gnu
          path: ./dist

      - name: Upload binary to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.MACHINE_IP }}
          username: ${{ secrets.MACHINE_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: ./dist/vidly
          target: /tmp

      - name: Restart systemd service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MACHINE_IP }}
          username: ${{ secrets.MACHINE_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/vidly
            sudo chmod +x /tmp/dist/vidly
            sudo install -m 0755 /tmp/dist/vidly /opt/vidly/vidly
            sudo systemctl daemon-reload
            sudo systemctl restart vidly.service
            sudo systemctl is-active vidly.service
            echo "Deployment finished successfully"